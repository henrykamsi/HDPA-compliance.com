<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDPC Premium Gatekeeper</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; }
        
        /* Premium Glassmorphism Dark Blue Overlay */
        #hdpc-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(3, 17, 36, 0.85); backdrop-filter: blur(12px);
            z-index: 9999999; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        /* High-Grade Card */
        .hdpc-card {
            background: #06162d; width: 100%; max-width: 420px; padding: 40px 30px;
            border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; border: 1px solid #14355c; border-top: 4px solid #48abe0;
            position: relative;
        }

        /* Small Logo & Header */
        .hdpc-logo { width: 55px; height: auto; margin-bottom: 15px; animation: glow-pulse 2s infinite alternate; }
        .hdpc-title { font-size: 22px; font-weight: 800; color: #ffffff; margin-bottom: 5px; letter-spacing: 0.5px; }
        .hdpc-subtitle { font-size: 13px; color: #8da4c0; margin-bottom: 30px; font-weight: 500; }
        
        /* Premium Input Field */
        .hdpc-input {
            width: 100%; padding: 16px; background: #020a16; border: 1px solid #1a3c63; 
            border-radius: 8px; font-size: 15px; text-align: center; color: #ffffff; 
            outline: none; margin-bottom: 25px; box-sizing: border-box; letter-spacing: 1px;
            transition: all 0.3s ease; font-weight: 600;
        }
        .hdpc-input::placeholder { color: #47668b; font-weight: 400; }
        .hdpc-input:focus { border-color: #48abe0; box-shadow: 0 0 12px rgba(72,171,224,0.3); }

        /* Action Buttons */
        .hdpc-btn {
            background: #48abe0; color: #031124; border: none; width: 100%; padding: 15px;
            border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer;
            transition: background 0.3s, transform 0.1s; text-transform: uppercase; letter-spacing: 1px;
        }
        .hdpc-btn:hover { background: #358fbe; }
        .hdpc-btn:active { transform: scale(0.98); }

        .hdpc-redirect-btn {
            background: transparent; color: #8da4c0; border: 1px solid #1a3c63;
            width: 100%; padding: 12px; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; margin-top: 25px; display: none;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .hdpc-redirect-btn:hover { color: #ffffff; border-color: #48abe0; background: rgba(72,171,224,0.1); }

        /* Premium DNA Loader Animation */
        .hdpc-status { display: none; flex-direction: column; align-items: center; margin-top: 10px; margin-bottom: 20px; }
        .dna-loader { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px; }
        .dna-strand {
            width: 6px; height: 45px; background: #14355c; border-radius: 4px;
            animation: dna-spin 1.5s linear infinite; transform-style: preserve-3d;
        }
        .dna-strand:nth-child(1) { animation-delay: 0s; }
        .dna-strand:nth-child(2) { animation-delay: 0.2s; }
        .dna-strand:nth-child(3) { animation-delay: 0.4s; }
        .dna-strand:nth-child(4) { animation-delay: 0.6s; }
        .dna-strand:nth-child(5) { animation-delay: 0.8s; }

        @keyframes dna-spin {
            0% { transform: rotateX(0deg); background: #14355c; }
            50% { transform: rotateX(180deg); background: #48abe0; box-shadow: 0 0 10px #48abe0; }
            100% { transform: rotateX(360deg); background: #14355c; }
        }
        @keyframes glow-pulse {
            from { filter: drop-shadow(0 0 2px #48abe0); }
            to { filter: drop-shadow(0 0 8px #48abe0); }
        }

        .hdpc-status-text { font-size: 15px; font-weight: 600; color: #48abe0; letter-spacing: 1px; text-transform: uppercase; }

        /* High-Grade Icons */
        .hdpc-icon { width: 70px; height: 70px; margin-bottom: 20px; display: none; }
        .hdpc-success { fill: #48abe0; filter: drop-shadow(0 0 10px rgba(72,171,224,0.5)); }
        .hdpc-error { fill: #e04848; filter: drop-shadow(0 0 10px rgba(224,72,72,0.5)); }

    </style>
</head>
<body>

    <div id="hdpc-container">
        <div class="hdpc-card">
            
            <!-- Result Icons -->
            <svg class="hdpc-icon hdpc-success" id="hdpc-success-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            <svg class="hdpc-icon hdpc-error" id="hdpc-error-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>

            <!-- Main Form View -->
            <div id="hdpc-form-view">
                <img src="https://cdn.phototourl.com/free/2026-07-13-b04fcd38-f6d4-4406-b3f8-daf40903fda0.png" alt="HDPA Logo" class="hdpc-logo">
                <div class="hdpc-title">Henry Data Privacy Checkout</div>
                <div class="hdpc-subtitle">Authorized Access & Regulatory Accountability</div>
                
                <!-- Updated Placeholder with Professional Code Format -->
                <input type="text" id="hdpc-code-input" class="hdpc-input" placeholder="HGT-XXXXX-HPAC" autocomplete="off">
                
                <button id="hdpc-proceed-btn" class="hdpc-btn">Authenticate</button>
            </div>

            <!-- Loading View -->
            <div class="hdpc-status" id="hdpc-loading-view">
                <div class="dna-loader">
                    <div class="dna-strand"></div><div class="dna-strand"></div>
                    <div class="dna-strand"></div><div class="dna-strand"></div><div class="dna-strand"></div>
                </div>
                <div class="hdpc-status-text" id="hdpc-loading-text">Verifying...</div>
            </div>

            <!-- Redirect Button -->
            <button id="hdpc-register-btn" class="hdpc-redirect-btn">I have not created an HPAC</button>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // HGT Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA7p9HknzV6mmX3Fe78U-l46DqY0fikC58",
            authDomain: "hgt-policy.firebaseapp.com",
            projectId: "hgt-policy",
            storageBucket: "hgt-policy.firebasestorage.app",
            messagingSenderId: "440193588775",
            appId: "1:440193588775:web:49fe3fb7d8ee3e008cf802",
            measurementId: "G-X18YPTYQCE"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Element Selection
        const proceedBtn = document.getElementById('hdpc-proceed-btn');
        const codeInput = document.getElementById('hdpc-code-input');
        const formView = document.getElementById('hdpc-form-view');
        const loadingView = document.getElementById('hdpc-loading-view');
        const loadingText = document.getElementById('hdpc-loading-text');
        const successIcon = document.getElementById('hdpc-success-icon');
        const errorIcon = document.getElementById('hdpc-error-icon');
        const registerBtn = document.getElementById('hdpc-register-btn');
        const container = document.getElementById('hdpc-container');

        // Link to Index
        registerBtn.addEventListener('click', () => {
            window.location.href = "index.html"; 
        });

        // Verification Event
        proceedBtn.addEventListener('click', async () => {
            // Automatically convert input to uppercase for exact database matching
            const hpacValue = codeInput.value.trim().toUpperCase();
            if (!hpacValue) return;

            formView.style.display = 'none';
            loadingView.style.display = 'flex';
            
            setTimeout(() => { loadingText.innerText = "Authenticating..."; }, 1500);

            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("hpac", "==", hpacValue));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // Success State
                    loadingView.style.display = 'none';
                    successIcon.style.display = 'inline-block';
                    
                    const titleEl = document.createElement('div');
                    titleEl.className = 'hdpc-title';
                    titleEl.style.marginTop = '20px';
                    titleEl.style.color = '#48abe0';
                    titleEl.innerText = 'ACCESS GRANTED';
                    successIcon.after(titleEl);

                    // Smooth fade out
                    setTimeout(() => {
                        container.style.opacity = '0';
                        setTimeout(() => container.style.display = 'none', 500);
                    }, 1800);

                } else {
                    // Error State
                    loadingView.style.display = 'none';
                    errorIcon.style.display = 'inline-block';
                    registerBtn.style.display = 'block';

                    const titleEl = document.createElement('div');
                    titleEl.className = 'hdpc-title';
                    titleEl.style.marginTop = '20px';
                    titleEl.style.color = '#e04848';
                    titleEl.innerText = 'ACCESS DECLINED';
                    errorIcon.after(titleEl);
                }
            } catch (error) {
                loadingText.innerText = "SYSTEM ERROR";
                loadingText.style.color = "#e04848";
                setTimeout(() => {
                    loadingView.style.display = 'none';
                    formView.style.display = 'block';
                    loadingText.style.color = "#48abe0"; // reset color
                }, 2000);
            }
        });
    </script>
</body>
</html>
